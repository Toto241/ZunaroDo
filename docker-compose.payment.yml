# Optional: Payment-Webhook-Server fuer Pro-Lizenzen (Paddle/Lemon).
# Vor Start: release/payment-server.env aus release/payment-server.env.example anlegen.
services:
  payment-server:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app:ro
    env_file:
      - release/payment-server.env
    command: >
      python tools/payment_server.py
      --host 0.0.0.0 --port 7000
      --paddle-mapping pri_ANNUAL=pro_annual:2,pri_FAMILY=pro_family:5,pri_MONTHLY=pro_monthly:2
    ports:
      - "7000:7000"
