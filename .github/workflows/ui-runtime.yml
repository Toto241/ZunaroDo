name: UI Runtime Smoke

# Startet die echten Oberflaechen (nicht nur statische Checks), um
# Boot-/Render-Crashes zu fangen - die Klasse von Fehlern, die Googles
# Pre-Launch-Report auf echten Geraeten findet.
#
# Beide Jobs sind zunaechst BERATEND (continue-on-error: true): sie wurden
# ohne lokale Ausfuehrungs-Umgebung erstellt. Der Release-Owner beobachtet
# den ersten gruenen Lauf und entfernt dann 'continue-on-error', um sie
# verpflichtend zu machen.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-gui-smoke:
    name: Desktop-GUI-Boot (customtkinter, Xvfb)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: System-Display (Xvfb) + Tk
        run: sudo apt-get update && sudo apt-get install -y xvfb tk
      - name: Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: GUI-Boot-Smoke (headless via xvfb-run)
        run: xvfb-run -a python -m unittest tests.test_gui_boot_smoke -v

  mobile-kivy-smoke:
    name: Mobile-Boot (KivyMD, Mock-Window)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      KIVY_WINDOW: mock
      KIVY_GL_BACKEND: mock
      KIVY_NO_ARGS: "1"
      KIVY_NO_CONSOLELOG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: SDL-/Mtdev-Systembibliotheken
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 libmtdev1 xclip xsel
      - name: Dependencies (App-Runtime + Kivy/KivyMD wie buildozer.spec)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "kivy==2.3.0" "kivymd==1.2.0"
      - name: Mobile-Boot-Smoke (headless)
        run: python -m unittest tests.test_mobile_boot_smoke -v
