name: Android Robo/Monkey (Emulator)

# Pendant zu Googles Pre-Launch-Report: baut ein Debug-APK und laesst es
# auf einem echten Android-Emulator mit dem Stress-Tester 'monkey' laufen,
# um Crashes/ANRs zu finden, die nur zur Laufzeit auf einem Geraet
# auftreten.
#
# Bewusst NUR manuell (workflow_dispatch) - der Build (buildozer) und der
# Emulator sind teuer/langsam. Fuer die Produktion ist Googles eigener
# Pre-Launch-Report (Upload in den Internal-Track) der maßgebliche,
# kostenlose Weg auf echten Geraeten; dieser Workflow ist die
# Repo-seitige Vorab-Absicherung.

on:
  workflow_dispatch:
    inputs:
      monkey_events:
        description: "Anzahl Monkey-Events"
        required: false
        default: "500"

permissions:
  contents: read

jobs:
  build-apk:
    name: Debug-APK bauen
    # Gepinnter Runner + nativer buildozer-Aufruf (offizieller Kivy-Weg).
    # Die frueher genutzte Community-Action 'ArtemSBulgakov/buildozer-action'
    # ist defekt: ihr Docker-Build fusst auf dem beweglichen Image
    # ghcr.io/kivy/buildozer:latest und installiert JDK ueber das
    # openjdk-r-PPA, das fuer dessen neues Ubuntu kein Release hat (404) -
    # der Build scheiterte damit deterministisch vor dem ersten
    # buildozer-Befehl. Nativ entfaellt zudem das Drittanbieter-Image.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: System-Abhaengigkeiten (python-for-android)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool libtool-bin pkg-config \
            cmake build-essential libffi-dev libssl-dev zlib1g-dev \
            libncurses-dev ccache
      - name: Buildozer installieren
        run: python -m pip install "buildozer==1.5.0" "cython==3.0.11"
      - name: SDK/NDK-Cache
        # ~/.buildozer haelt Android-SDK/NDK (~2-3 GB Download beim 1. Lauf).
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-${{ runner.os }}-
      - name: Debug-APK (buildozer)
        run: buildozer android debug
      - name: APK als Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: bin/*.apk
          if-no-files-found: error

  robo:
    name: Monkey auf Emulator
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: APK-Artefakt holen
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: bin
      - name: KVM freigeben
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Emulator + Monkey
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          script: |
            adb install -r bin/*.apk
            PKG=de.alltagshelfer.alltagshelfer
            adb shell monkey -p "$PKG" --throttle 200 \
              --pct-syskeys 0 -v ${{ github.event.inputs.monkey_events || '500' }}
            # Auf Crashes/ANRs im Logcat pruefen
            if adb logcat -d | grep -E "FATAL EXCEPTION|ANR in $PKG"; then
              echo "::error::Crash/ANR im Monkey-Lauf gefunden"
              exit 1
            fi
