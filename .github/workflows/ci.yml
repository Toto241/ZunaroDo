name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements-dev zieht requirements.txt + Test-Deps (pytest, PyYAML).
          pip install -r requirements-dev.txt

      - name: Byte-compile
        run: python -m compileall -q .

      - name: Smoke-Tests
        run: python -m unittest discover -s tests

      - name: Sync-Server kann gestartet werden
        run: |
          python -c "from services.sync_server import serve; print('OK')"
