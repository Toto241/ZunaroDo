name: Android Release (AAB)

# Baut ein signiertes Android App Bundle (.aab) fuer den Play-Store-Upload.
#
# Bewusst NUR manuell ausloesbar (workflow_dispatch): ein Release-Build ist
# teuer (Android SDK/NDK) und soll nie unbeaufsichtigt bei jedem Push laufen.
# Der Workflow LAEDT NICHTS automatisch zu Google Play hoch - er erzeugt das
# AAB als Build-Artefakt; der Upload bleibt eine bewusste Hand-Aktion.
#
# Benoetigte GitHub-Secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64       base64 des Upload-Keystores (.keystore/.jks)
#                                 z.B.: base64 -w0 upload.keystore
#   ANDROID_KEYSTORE_PASSWORD     Keystore-Passwort
#   ANDROID_KEY_ALIAS             Alias des Upload-Keys
#   ANDROID_KEY_ALIAS_PASSWORD    Passwort des Alias
#
# Hinweis: buildozer laeuft nativ auf dem Runner (offizieller Kivy-Weg).
# Die frueher genutzte Community-Action 'ArtemSBulgakov/buildozer-action'
# ist defekt (Docker-Basis ghcr.io/kivy/buildozer:latest + openjdk-r-PPA
# ohne Release fuer dessen Ubuntu -> apt 404) und entfaellt damit auch
# als Drittanbieter-Abhaengigkeit.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag oder Branch zum Bauen (leer = aktueller Ref)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-aab:
    name: AAB bauen & signieren
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Secrets-Vorpruefung
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_ALIAS_PWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          missing=""
          [ -z "$KEYSTORE_B64" ] && missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -z "$KEYSTORE_PWD" ] && missing="$missing ANDROID_KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]    && missing="$missing ANDROID_KEY_ALIAS"
          [ -z "$KEY_ALIAS_PWD" ] && missing="$missing ANDROID_KEY_ALIAS_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Fehlende Release-Secrets:$missing"
            echo "Siehe Kopf von .github/workflows/android-release.yml."
            exit 1
          fi

      - name: Upload-Keystore wiederherstellen
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          test -s "$RUNNER_TEMP/upload.keystore"

      - name: Setup Python (Gates + buildozer-Host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Gate-Abhaengigkeiten
        run: python -m pip install --quiet pyyaml pillow

      - name: Compliance-Gate (strict) vor dem Build
        run: python -m tools.playstore_check --strict

      - name: Asset-Gate (keine Platzhalter-Grafiken/-Screenshots)
        # Blockiert den Release-Build, solange Store-Assets einfarbige
        # Platzhalter sind (z.B. noch keine echten In-App-Screenshots).
        # Bewusst NUR hier, nicht in der routinemaeßigen main-CI.
        run: python -m tools.gen_assets --check

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: System-Abhaengigkeiten (python-for-android)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool libtool-bin libltdl-dev \
            pkg-config cmake build-essential libffi-dev libssl-dev \
            zlib1g-dev libncurses-dev ccache tcl

      - name: Buildozer installieren
        run: python -m pip install "buildozer==1.5.0" "cython==3.0.11"

      - name: SDK/NDK-Cache
        # ~/.buildozer haelt Android-SDK/NDK (~2-3 GB Download beim 1. Lauf).
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-${{ runner.os }}-

      - name: AAB bauen (buildozer android release)
        run: buildozer android release
        env:
          P4A_RELEASE_KEYSTORE: ${{ runner.temp }}/upload.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}

      - name: AAB als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: alltagshelfer-release-aab
          # buildozer.spec setzt bin_dir = dist
          path: dist/*.aab
          if-no-files-found: error
          retention-days: 14
